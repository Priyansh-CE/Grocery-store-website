<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Grocery Cloud System - Full Version</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<style>
body{font-family:Arial;margin:0;background:#f1f5f9}
header{background:#0f172a;color:white;padding:15px;text-align:center}
.container{max-width:1200px;margin:auto;padding:20px}
.card{background:white;padding:15px;border-radius:10px;margin-bottom:20px;box-shadow:0 4px 10px rgba(0,0,0,0.1)}
input,select,button{padding:8px;margin:5px}
button{background:#0f172a;color:white;border:none;border-radius:5px;cursor:pointer}
button:hover{background:#1e293b}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #ddd;padding:8px;text-align:center}
th{background:#e2e8f0}
.dashboard{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px}
.stat{background:white;padding:15px;border-radius:10px;text-align:center;box-shadow:0 3px 8px rgba(0,0,0,0.1)}
.low{color:red;font-weight:bold}
</style>
</head>
<body>
<header><h2>🛒 Smart Grocery SaaS System</h2></header>
<div class="container">

<!-- Login -->
<div class="card">
<h3>🔐 Login / Register</h3>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
</div>

<!-- Dashboard -->
<div class="dashboard">
<div class="stat">Total Sales<br>₹<strong id="totalSales">0</strong></div>
<div class="stat">Total Cost<br>₹<strong id="totalCost">0</strong></div>
<div class="stat">Total Profit<br>₹<strong id="totalProfit">0</strong></div>
<div class="stat">Low Stock Items<br><strong id="lowStockCount">0</strong></div>
</div>

<!-- Product Management -->
<div class="card">
<h3>📦 Add Product</h3>
<input type="text" id="pname" placeholder="Product Name">
<input type="number" id="cost" placeholder="Purchase Cost">
<input type="number" id="price" placeholder="Selling Price">
<input type="number" id="stock" placeholder="Stock Qty">
<button onclick="addProduct()">Add</button>
<table>
<thead><tr><th>Name</th><th>Cost</th><th>Price</th><th>Stock</th></tr></thead>
<tbody id="productTable"></tbody>
</table>
</div>

<!-- Billing -->
<div class="card">
<h3>🧾 Generate Bill</h3>
<select id="billProduct"></select>
<input type="number" id="qty" placeholder="Quantity">
<button onclick="addToBill()">Add</button>
<table>
<thead><tr><th>Product</th><th>Qty</th><th>Total</th></tr></thead>
<tbody id="billTable"></tbody>
</table>
<h3>Total: ₹<span id="billTotal">0</span></h3>
<button onclick="finalizeBill()">Finalize Bill</button>
<button onclick="window.print()">Download PDF</button>
</div>

<!-- Analytics -->
<div class="card">
<h3>📊 Sales Analytics</h3>
<canvas id="salesChart"></canvas>
</div>

</div>

<script>
// Firebase Config (Replace with your config)
var firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

let products=[];
let bill=[];
let sales=[];

function register(){
let email=document.getElementById('email').value;
let pass=document.getElementById('password').value;
firebase.auth().createUserWithEmailAndPassword(email,pass);
}

function login(){
let email=document.getElementById('email').value;
let pass=document.getElementById('password').value;
firebase.auth().signInWithEmailAndPassword(email,pass);
}

function logout(){ firebase.auth().signOut(); }

firebase.auth().onAuthStateChanged(user=>{
if(user){ loadData(); }
});

function addProduct(){
let name=pname.value;
let costVal=parseFloat(cost.value);
let priceVal=parseFloat(price.value);
let stockVal=parseInt(stock.value);
if(!name||!costVal||!priceVal||!stockVal) return;
db.collection("products").add({name,cost:costVal,price:priceVal,stock:stockVal});
}

function loadData(){
db.collection("products").onSnapshot(snapshot=>{
products=[];
productTable.innerHTML="";
billProduct.innerHTML="";
let low=0;
snapshot.forEach(doc=>{
let p=doc.data();
p.id=doc.id;
products.push(p);
if(p.stock<=5) low++;
productTable.innerHTML+=`<tr><td>${p.name}</td><td>${p.cost}</td><td>${p.price}</td><td class='${p.stock<=5?"low":""}'>${p.stock}</td></tr>`;
billProduct.add(new Option(p.name,p.id));
});
lowStockCount.innerText=low;
});
}

function addToBill(){
let id=billProduct.value;
let qtyVal=parseInt(qty.value);
let product=products.find(p=>p.id===id);
if(!qtyVal||qtyVal>product.stock) return alert("Not enough stock");
bill.push({id,name:product.name,qty:qtyVal,total:product.price*qtyVal,cost:product.cost*qtyVal});
renderBill();
}

function renderBill(){
billTable.innerHTML="";
let total=0;
bill.forEach(b=>{
billTable.innerHTML+=`<tr><td>${b.name}</td><td>${b.qty}</td><td>₹${b.total}</td></tr>`;
total+=b.total;
});
billTotal.innerText=total;
}

function finalizeBill(){
let total=0,costTotal=0;
bill.forEach(b=>{
total+=b.total;
costTotal+=b.cost;
let product=products.find(p=>p.id===b.id);
db.collection("products").doc(b.id).update({stock:product.stock-b.qty});
});
db.collection("sales").add({date:new Date(),amount:total,cost:costTotal});
bill=[];
renderBill();
updateDashboard();
}

function updateDashboard(){
db.collection("sales").onSnapshot(snapshot=>{
let total=0,cost=0;
sales=[];
snapshot.forEach(doc=>{
let s=doc.data();
total+=s.amount;
cost+=s.cost;
sales.push(s);
});
totalSales.innerText=total;
totalCost.innerText=cost;
totalProfit.innerText=total-cost;
updateChart();
});
}

function updateChart(){
let ctx=document.getElementById('salesChart');
let labels=sales.map(s=>new Date(s.date.seconds*1000).toLocaleDateString());
let data=sales.map(s=>s.amount);
new Chart(ctx,{type:'bar',data:{labels:labels,datasets:[{label:'Sales',data:data}]}});
}

updateDashboard();
</script>
</body>
</html>
