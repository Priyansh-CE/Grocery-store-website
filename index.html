<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Grocery Store</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }
        header {
            background-color: #2e7d32;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .container {
            padding: 20px;
        }
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
        }
        button {
            background-color: #2e7d32;
            color: white;
            border: none;
            padding: 8px 12px;
            margin-top: 10px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #1b5e20;
        }
        footer {
            text-align: center;
            padding: 15px;
            background: #ddd;
            margin-top: 20px;
        }
        .cart {
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <h2>🛒 Fresh Grocery Store</h2>
    <div class="cart">Cart Total: ₹<span id="total">0</span></div>
</header>

<div class="container">
    <div class="products">
        <div class="card">
            <img src="https://source.unsplash.com/400x300/?apples" alt="Apples">
            <h3>Fresh Apples</h3>
            <p>₹120</p>
            <button onclick="addToCart(120)">Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://source.unsplash.com/400x300/?bananas" alt="Bananas">
            <h3>Bananas</h3>
            <p>₹60</p>
            <button onclick="addToCart(60)">Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://source.unsplash.com/400x300/?tomatoes" alt="Tomatoes">
            <h3>Tomatoes</h3>
            <p>₹40</p>
            <button onclick="addToCart(40)">Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://source.unsplash.com/400x300/?milk" alt="Milk">
            <h3>Milk</h3>
            <p>₹55</p>
            <button onclick="addToCart(55)">Add to Cart</button>
        </div>
    </div>
</div>

<footer>
    © 2026 Fresh Grocery Store | All Rights Reserved
</footer>

<script>
    let total = 0;
    function addToCart(price) {
        total += price;
        document.getElementById('total').innerText = total;
    }
</script>

</body>
</html>
