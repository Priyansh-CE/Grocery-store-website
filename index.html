<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Grocery Store Management System</title>
<style>
body{font-family:Arial;margin:0;background:#eef2f7}
header{background:#0d47a1;color:#fff;padding:15px;text-align:center}
.container{max-width:1200px;margin:auto;padding:20px}
.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:15px;box-shadow:0 3px 10px rgba(0,0,0,0.1)}
h3{margin-top:0}
input,select,button{padding:8px;margin:5px}
button{background:#0d47a1;color:#fff;border:none;border-radius:5px;cursor:pointer}
button:hover{background:#08306b}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #ddd;padding:8px;text-align:center}
th{background:#e3f2fd}
.flex{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.dashboard{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px}
.stat{background:#fff;padding:15px;border-radius:10px;text-align:center;box-shadow:0 3px 8px rgba(0,0,0,0.1)}
.hidden{display:none}
.small-btn{padding:4px 7px;font-size:12px}
</style>
</head>
<body>

<header>
<h2>🛒 Advanced Grocery Store Management</h2>
</header>

<div class="container">

<!-- Dashboard -->
<div class="dashboard">
<div class="stat">Total Customers<br><strong id="totalCustomers">0</strong></div>
<div class="stat">Total Udhar<br><strong>₹<span id="totalCredit">0</span></strong></div>
<div class="stat">Total Received<br><strong>₹<span id="totalDebit">0</span></strong></div>
<div class="stat">Net Balance<br><strong>₹<span id="netBalance">0</span></strong></div>
</div>

<!-- Customer Section -->
<div class="card">
<h3>Customer Management</h3>
<div class="flex">
<input type="text" id="customerName" placeholder="Customer Name">
<button onclick="addCustomer()">Add Customer</button>
<select id="customerSelect"></select>
<button onclick="deleteCustomer()" class="small-btn">Delete</button>
</div>
</div>

<!-- Transaction Section -->
<div class="card">
<h3>Add Transaction</h3>
<div class="flex">
<select id="transCustomer"></select>
<select id="type">
<option value="credit">Udhar</option>
<option value="debit">Payment</option>
</select>
<input type="number" id="amount" placeholder="Amount">
<input type="text" id="note" placeholder="Note">
<button onclick="addTransaction()">Add Entry</button>
</div>
</div>

<!-- Inventory Section -->
<div class="card">
<h3>Stock Management</h3>
<div class="flex">
<input type="text" id="productName" placeholder="Product Name">
<input type="number" id="productQty" placeholder="Quantity">
<input type="number" id="productPrice" placeholder="Price">
<button onclick="addProduct()">Add Product</button>
</div>
<table>
<thead>
<tr><th>Product</th><th>Qty</th><th>Price</th><th>Action</th></tr>
</thead>
<tbody id="productTable"></tbody>
</table>
</div>

<!-- Records Section -->
<div class="card">
<h3>Transaction Records</h3>
<input type="text" id="search" placeholder="Search Customer" onkeyup="renderTransactions()">
<table>
<thead>
<tr><th>Date</th><th>Customer</th><th>Type</th><th>Amount</th><th>Note</th><th>Action</th></tr>
</thead>
<tbody id="records"></tbody>
</table>
<button onclick="printReport()">Print Report</button>
<button onclick="exportCSV()">Download CSV</button>
</div>

</div>

<script>
let customers=JSON.parse(localStorage.getItem('customers'))||[];
let transactions=JSON.parse(localStorage.getItem('transactions'))||[];
let products=JSON.parse(localStorage.getItem('products'))||[];

function saveData(){
localStorage.setItem('customers',JSON.stringify(customers));
localStorage.setItem('transactions',JSON.stringify(transactions));
localStorage.setItem('products',JSON.stringify(products));
}

function init(){
updateCustomerUI();
renderTransactions();
renderProducts();
updateDashboard();
}

function addCustomer(){
let name=document.getElementById('customerName').value.trim();
if(!name) return;
customers.push(name);
document.getElementById('customerName').value="";
saveData();
updateCustomerUI();
updateDashboard();
}

function deleteCustomer(){
let name=document.getElementById('customerSelect').value;
customers=customers.filter(c=>c!==name);
transactions=transactions.filter(t=>t.customer!==name);
saveData();
updateCustomerUI();
renderTransactions();
updateDashboard();
}

function updateCustomerUI(){
let select=document.getElementById('customerSelect');
let trans=document.getElementById('transCustomer');
select.innerHTML="";
trans.innerHTML="";
customers.forEach(c=>{
select.add(new Option(c,c));
trans.add(new Option(c,c));
});
document.getElementById('totalCustomers').innerText=customers.length;
}

function addTransaction(){
let customer=document.getElementById('transCustomer').value;
let type=document.getElementById('type').value;
let amount=parseFloat(document.getElementById('amount').value);
let note=document.getElementById('note').value;
if(!customer||!amount) return;
transactions.push({date:new Date().toLocaleDateString(),customer,type,amount,note});
document.getElementById('amount').value="";
document.getElementById('note').value="";
saveData();
renderTransactions();
updateDashboard();
}

function renderTransactions(){
let tbody=document.getElementById('records');
let search=document.getElementById('search').value.toLowerCase();
tbody.innerHTML="";
transactions.filter(t=>t.customer.toLowerCase().includes(search)).forEach((t,i)=>{
tbody.innerHTML+=`<tr>
<td>${t.date}</td>
<td>${t.customer}</td>
<td>${t.type}</td>
<td>₹${t.amount}</td>
<td>${t.note}</td>
<td><button class='small-btn' onclick='deleteTransaction(${i})'>Delete</button></td>
</tr>`;
});
}

function deleteTransaction(i){
transactions.splice(i,1);
saveData();
renderTransactions();
updateDashboard();
}

function updateDashboard(){
let credit=0,debit=0;
transactions.forEach(t=>{
if(t.type==='credit') credit+=t.amount;
else debit+=t.amount;
});
document.getElementById('totalCredit').innerText=credit;
document.getElementById('totalDebit').innerText=debit;
document.getElementById('netBalance').innerText=credit-debit;
}

function addProduct(){
let name=document.getElementById('productName').value;
let qty=parseInt(document.getElementById('productQty').value);
let price=parseFloat(document.getElementById('productPrice').value);
if(!name||!qty||!price) return;
products.push({name,qty,price});
saveData();
renderProducts();
}

function renderProducts(){
let tbody=document.getElementById('productTable');
tbody.innerHTML="";
products.forEach((p,i)=>{
tbody.innerHTML+=`<tr>
<td>${p.name}</td>
<td>${p.qty}</td>
<td>₹${p.price}</td>
<td><button class='small-btn' onclick='deleteProduct(${i})'>Delete</button></td>
</tr>`;
});
}

function deleteProduct(i){
products.splice(i,1);
saveData();
renderProducts();
}

function exportCSV(){
let csv="Date,Customer,Type,Amount,Note\n";
transactions.forEach(t=>{
csv+=`${t.date},${t.customer},${t.type},${t.amount},${t.note}\n`;
});
let blob=new Blob([csv],{type:'text/csv'});
let link=document.createElement('a');
link.href=URL.createObjectURL(blob);
link.download="grocery_report.csv";
link.click();
}

function printReport(){
window.print();
}

init();
</script>

</body>
</html>
