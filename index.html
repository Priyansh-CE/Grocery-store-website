<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complete Grocery Hisab Management</title>
<style>
body{font-family:Arial;margin:0;background:#f4f6f9}
header{background:#1b5e20;color:#fff;padding:15px;text-align:center}
.container{padding:20px;max-width:1100px;margin:auto}
.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:15px;box-shadow:0 3px 8px rgba(0,0,0,0.1)}
input,select,button{padding:8px;margin:5px}
button{background:#1b5e20;color:#fff;border:none;cursor:pointer;border-radius:5px}
button:hover{background:#0d3d14}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #ddd;padding:8px;text-align:center}
th{background:#e8f5e9}
.balance{font-size:18px;font-weight:bold}
.flex{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.small-btn{padding:5px 8px;font-size:12px}
.login-box{max-width:300px;margin:100px auto;background:#fff;padding:20px;border-radius:10px;box-shadow:0 3px 10px rgba(0,0,0,0.2)}
.hidden{display:none}
</style>
</head>
<body>

<div id="loginSection" class="login-box">
<h3>Store Login</h3>
<input type="password" id="password" placeholder="Enter Password">
<button onclick="login()">Login</button>
</div>

<div id="appSection" class="hidden">
<header>
<h2>🛒 Grocery Store Complete Hisab System</h2>
</header>

<div class="container">

<div class="card">
<h3>Add Customer</h3>
<div class="flex">
<input type="text" id="customerName" placeholder="Customer Name">
<button onclick="addCustomer()">Add</button>
<select id="customerFilter" onchange="filterCustomer()"></select>
<button onclick="deleteCustomer()" class="small-btn">Delete Customer</button>
</div>
</div>

<div class="card">
<h3>Add Transaction</h3>
<div class="flex">
<select id="customerSelect"></select>
<select id="type">
<option value="credit">Udhar (Customer Dena Hai)</option>
<option value="debit">Payment Mila</option>
</select>
<input type="number" id="amount" placeholder="Amount">
<input type="text" id="note" placeholder="Note">
<button onclick="addTransaction()">Add Entry</button>
</div>
</div>

<div class="card">
<h3>Records</h3>
<div class="balance">Total Balance: ₹<span id="totalBalance">0</span></div>
<input type="text" id="search" placeholder="Search Customer" onkeyup="renderTransactions()">
<table>
<thead>
<tr>
<th>Date</th>
<th>Customer</th>
<th>Type</th>
<th>Amount</th>
<th>Note</th>
<th>Action</th>
</tr>
</thead>
<tbody id="records"></tbody>
</table>
<button onclick="exportCSV()">Download Excel (CSV)</button>
<button onclick="clearAll()" style="background:red">Clear All Data</button>
</div>

</div>
</div>

<script>
let customers = JSON.parse(localStorage.getItem('customers')) || [];
let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

function login(){
if(document.getElementById('password').value === "1234"){
document.getElementById('loginSection').classList.add('hidden');
document.getElementById('appSection').classList.remove('hidden');
init();
}else{alert("Wrong Password");}
}

function init(){
updateCustomerSelect();
renderTransactions();
}

function saveData(){
localStorage.setItem('customers', JSON.stringify(customers));
localStorage.setItem('transactions', JSON.stringify(transactions));
}

function addCustomer(){
let name=document.getElementById('customerName').value.trim();
if(!name) return;
customers.push(name);
document.getElementById('customerName').value="";
saveData();
updateCustomerSelect();
}

function deleteCustomer(){
let selected=document.getElementById('customerFilter').value;
customers=customers.filter(c=>c!==selected);
transactions=transactions.filter(t=>t.customer!==selected);
saveData();
updateCustomerSelect();
renderTransactions();
}

function updateCustomerSelect(){
let select=document.getElementById('customerSelect');
let filter=document.getElementById('customerFilter');
select.innerHTML="";
filter.innerHTML="";
customers.forEach(c=>{
let opt1=new Option(c,c);
let opt2=new Option(c,c);
select.add(opt1);
filter.add(opt2);
});
}

function addTransaction(){
let customer=document.getElementById('customerSelect').value;
let type=document.getElementById('type').value;
let amount=parseFloat(document.getElementById('amount').value);
let note=document.getElementById('note').value;
if(!customer || !amount) return;
transactions.push({date:new Date().toLocaleDateString(),customer,type,amount,note});
document.getElementById('amount').value="";
document.getElementById('note').value="";
saveData();
renderTransactions();
}

function renderTransactions(){
let tbody=document.getElementById('records');
let search=document.getElementById('search').value.toLowerCase();
tbody.innerHTML="";
let balance=0;
transactions.filter(t=>t.customer.toLowerCase().includes(search)).forEach((t,index)=>{
let row=`<tr>
<td>${t.date}</td>
<td>${t.customer}</td>
<td>${t.type}</td>
<td>₹${t.amount}</td>
<td>${t.note}</td>
<td><button class='small-btn' onclick='deleteTransaction(${index})'>Delete</button></td>
</tr>`;
tbody.innerHTML+=row;
if(t.type==='credit') balance+=t.amount;
else balance-=t.amount;
});
document.getElementById('totalBalance').innerText=balance;
}

function deleteTransaction(index){
transactions.splice(index,1);
saveData();
renderTransactions();
}

function exportCSV(){
let csv="Date,Customer,Type,Amount,Note\n";
transactions.forEach(t=>{
csv+=`${t.date},${t.customer},${t.type},${t.amount},${t.note}\n`;
});
let blob=new Blob([csv],{type:'text/csv'});
let link=document.createElement('a');
link.href=URL.createObjectURL(blob);
link.download="hisab.csv";
link.click();
}

function clearAll(){
if(confirm("Are you sure?")){
localStorage.clear();
location.reload();
}
}
</script>

</body>
</html>
