<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Grocery Store Management System</title>
<style>
body{font-family:Arial;margin:0;background:#eef2f7}
header{background:#004d40;color:#fff;padding:15px;text-align:center}
.container{max-width:1300px;margin:auto;padding:20px}
.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:15px;box-shadow:0 3px 10px rgba(0,0,0,0.1)}
h3{margin-top:0}
input,select,button{padding:8px;margin:5px}
button{background:#004d40;color:#fff;border:none;border-radius:5px;cursor:pointer}
button:hover{background:#00251a}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #ddd;padding:8px;text-align:center}
th{background:#e0f2f1}
.flex{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.dashboard{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px}
.stat{background:#fff;padding:15px;border-radius:10px;text-align:center;box-shadow:0 3px 8px rgba(0,0,0,0.1)}
.small-btn{padding:4px 7px;font-size:12px}
.alert{color:red;font-weight:bold}
</style>
</head>
<body>

<header>
<h2>🛒 Ultimate Grocery Store Management</h2>
</header>

<div class="container">

<!-- Dashboard -->
<div class="dashboard">
<div class="stat">Customers<br><strong id="totalCustomers">0</strong></div>
<div class="stat">Total Udhar<br>₹<strong id="totalCredit">0</strong></div>
<div class="stat">Total Received<br>₹<strong id="totalDebit">0</strong></div>
<div class="stat">Net Balance<br>₹<strong id="netBalance">0</strong></div>
<div class="stat">Low Stock Items<br><strong id="lowStock">0</strong></div>
</div>

<!-- Customer Section -->
<div class="card">
<h3>Customer Management</h3>
<div class="flex">
<input type="text" id="customerName" placeholder="Customer Name">
<button onclick="addCustomer()">Add</button>
<select id="customerSelect" onchange="showCustomerBalance()"></select>
<button onclick="deleteCustomer()" class="small-btn">Delete</button>
</div>
<div id="customerBalance"></div>
</div>

<!-- Transaction Section -->
<div class="card">
<h3>Add Transaction</h3>
<div class="flex">
<select id="transCustomer"></select>
<select id="type">
<option value="credit">Udhar</option>
<option value="debit">Payment</option>
</select>
<input type="number" id="amount" placeholder="Amount">
<input type="text" id="note" placeholder="Note">
<button onclick="addTransaction()">Add Entry</button>
</div>
</div>

<!-- Inventory Section -->
<div class="card">
<h3>Stock Management</h3>
<div class="flex">
<input type="text" id="productName" placeholder="Product Name">
<input type="number" id="productQty" placeholder="Quantity">
<input type="number" id="productPrice" placeholder="Price">
<button onclick="addProduct()">Add Product</button>
</div>
<table>
<thead>
<tr><th>Product</th><th>Qty</th><th>Price</th><th>Status</th><th>Action</th></tr>
</thead>
<tbody id="productTable"></tbody>
</table>
</div>

<!-- Reports Section -->
<div class="card">
<h3>Reports</h3>
<button onclick="monthlyReport()">Monthly Report</button>
<button onclick="exportCSV()">Download CSV</button>
<button onclick="backupData()">Backup Data</button>
<input type="file" onchange="restoreData(event)">
<div id="reportResult"></div>
</div>

</div>

<script>
let customers=JSON.parse(localStorage.getItem('customers'))||[];
let transactions=JSON.parse(localStorage.getItem('transactions'))||[];
let products=JSON.parse(localStorage.getItem('products'))||[];

function saveData(){
localStorage.setItem('customers',JSON.stringify(customers));
localStorage.setItem('transactions',JSON.stringify(transactions));
localStorage.setItem('products',JSON.stringify(products));
}

function init(){
updateCustomerUI();
renderProducts();
updateDashboard();
}

function addCustomer(){
let name=document.getElementById('customerName').value.trim();
if(!name) return;
customers.push(name);
document.getElementById('customerName').value="";
saveData();
updateCustomerUI();
updateDashboard();
}

function deleteCustomer(){
let name=document.getElementById('customerSelect').value;
customers=customers.filter(c=>c!==name);
transactions=transactions.filter(t=>t.customer!==name);
saveData();
updateCustomerUI();
updateDashboard();
}

function updateCustomerUI(){
let select=document.getElementById('customerSelect');
let trans=document.getElementById('transCustomer');
select.innerHTML="";
trans.innerHTML="";
customers.forEach(c=>{
select.add(new Option(c,c));
trans.add(new Option(c,c));
});
document.getElementById('totalCustomers').innerText=customers.length;
}

function addTransaction(){
let customer=document.getElementById('transCustomer').value;
let type=document.getElementById('type').value;
let amount=parseFloat(document.getElementById('amount').value);
let note=document.getElementById('note').value;
if(!customer||!amount) return;
transactions.push({date:new Date(),customer,type,amount,note});
document.getElementById('amount').value="";
document.getElementById('note').value="";
saveData();
updateDashboard();
showCustomerBalance();
}

function showCustomerBalance(){
let name=document.getElementById('customerSelect').value;
let balance=0;
transactions.filter(t=>t.customer===name).forEach(t=>{
if(t.type==='credit') balance+=t.amount;
else balance-=t.amount;
});
document.getElementById('customerBalance').innerHTML="Balance: ₹"+balance;
}

function updateDashboard(){
let credit=0,debit=0;
transactions.forEach(t=>{
if(t.type==='credit') credit+=t.amount;
else debit+=t.amount;
});
document.getElementById('totalCredit').innerText=credit;
document.getElementById('totalDebit').innerText=debit;
document.getElementById('netBalance').innerText=credit-debit;
let low=products.filter(p=>p.qty<5).length;
document.getElementById('lowStock').innerText=low;
}

function addProduct(){
let name=document.getElementById('productName').value;
let qty=parseInt(document.getElementById('productQty').value);
let price=parseFloat(document.getElementById('productPrice').value);
if(!name||!qty||!price) return;
products.push({name,qty,price});
saveData();
renderProducts();
updateDashboard();
}

function renderProducts(){
let tbody=document.getElementById('productTable');
tbody.innerHTML="";
products.forEach((p,i)=>{
let status=p.qty<5?"<span class='alert'>Low Stock</span>":"OK";
tbody.innerHTML+=`<tr>
<td>${p.name}</td>
<td>${p.qty}</td>
<td>₹${p.price}</td>
<td>${status}</td>
<td><button class='small-btn' onclick='deleteProduct(${i})'>Delete</button></td>
</tr>`;
});
}

function deleteProduct(i){
products.splice(i,1);
saveData();
renderProducts();
updateDashboard();
}

function monthlyReport(){
let month=new Date().getMonth();
let monthly=transactions.filter(t=>new Date(t.date).getMonth()===month);
let total=0;
monthly.forEach(t=>{if(t.type==='credit') total+=t.amount;});
document.getElementById('reportResult').innerHTML="This Month Total Udhar: ₹"+total;
}

function exportCSV(){
let csv="Date,Customer,Type,Amount,Note\n";
transactions.forEach(t=>{
csv+=`${new Date(t.date).toLocaleDateString()},${t.customer},${t.type},${t.amount},${t.note}\n`;
});
let blob=new Blob([csv],{type:'text/csv'});
let link=document.createElement('a');
link.href=URL.createObjectURL(blob);
link.download="grocery_report.csv";
link.click();
}

function backupData(){
let data={customers,transactions,products};
let blob=new Blob([JSON.stringify(data)],{type:'application/json'});
let link=document.createElement('a');
link.href=URL.createObjectURL(blob);
link.download="backup.json";
link.click();
}

function restoreData(event){
let file=event.target.files[0];
let reader=new FileReader();
reader.onload=function(){
let data=JSON.parse(reader.result);
customers=data.customers||[];
transactions=data.transactions||[];
products=data.products||[];
saveData();
init();
};
reader.readAsText(file);
}

init();
</script>

</body>
</html>
